<section class="py-16 px-6 relative w-full" id="puzzle">
  <div class="max-w-4xl mx-auto rounded-3xl bg-white/5 border border-white/10 p-8 backdrop-blur-lg shadow-2xl relative overflow-hidden">
    <!-- Decorative background blobs -->
    <div class="absolute -top-16 -right-16 w-64 h-64 bg-emerald-500/20 blur-3xl rounded-full pointer-events-none"></div>
    <div class="absolute -bottom-16 -left-16 w-64 h-64 bg-sky-500/20 blur-3xl rounded-full pointer-events-none"></div>

    <div class="relative z-10 text-center mb-8">
      <h2 class="text-3xl font-extrabold bg-gradient-to-r from-emerald-400 to-teal-300 bg-clip-text text-transparent">
        Eco Puzzle Adventure! 🌱
      </h2>
      <p class="text-gray-300 mt-2">Test your knowledge to protect Planetary's environment.</p>
    </div>

    <!-- Active Question State -->
    <div *ngIf="!quizComplete()" class="flex flex-col items-center">
      
      <!-- Score Banner -->
      <div class="mb-6 bg-white/10 px-4 py-2 rounded-full border border-white/15">
        <span class="text-emerald-400 font-bold">✨ Points:</span> 
        <span class="text-white ml-2 text-xl font-bold">{{ score() }}</span>
      </div>

      <!-- Question Card -->
      <div class="w-full max-w-2xl bg-black/40 rounded-2xl p-6 mb-6">
        <h3 class="text-xl font-semibold mb-6 text-center text-white">
          {{ currentQuestion().text }}
        </h3>

        <!-- Options Container -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <button 
            *ngFor="let option of currentQuestion().options; let i = index"
            (click)="selectOption(i)"
            [disabled]="showFeedback()"
            [ngClass]="{
              'bg-white/10 border-white/20 hover:bg-white/20 hover:border-emerald-500/50': !showFeedback() || (showFeedback() && selectedOption() !== i && i !== currentQuestion().correctIndex),
              'bg-emerald-500/30 border-emerald-500 text-emerald-100 ring-2 ring-emerald-500/50': showFeedback() && i === currentQuestion().correctIndex,
              'bg-red-500/30 border-red-500 text-red-100 opacity-60': showFeedback() && selectedOption() === i && i !== currentQuestion().correctIndex
            }"
            class="p-4 rounded-xl border text-left transition-all duration-300 ease-out focus:outline-none flex items-center justify-between"
          >
            <span>{{ option }}</span>
            <span *ngIf="showFeedback() && i === currentQuestion().correctIndex" class="text-emerald-400 text-xl font-bold">✓</span>
            <span *ngIf="showFeedback() && selectedOption() === i && i !== currentQuestion().correctIndex" class="text-red-400 text-xl font-bold">✗</span>
          </button>
        </div>
      </div>

      <!-- Feedback Area -->
      <div *ngIf="showFeedback()" class="w-full max-w-2xl animate-fade-in mb-6 bg-sky-900/40 border border-sky-500/30 rounded-xl p-5 text-center">
        <p class="text-sky-100 font-medium whitespace-pre-wrap">{{ currentQuestion().funFact }}</p>
      </div>

      <button 
        *ngIf="showFeedback()"
        (click)="nextQuestion()"
        class="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-black px-8 py-3 rounded-full font-bold text-lg transition-transform transform hover:scale-105"
      >
        {{ currentQuestionIndex() === questions.length - 1 ? 'Finish Puzzle' : 'Next Question ➡️' }}
      </button>

    </div>

    <!-- Quiz Complete State -->
    <div *ngIf="quizComplete()" class="text-center animate-fade-in flex flex-col items-center">
      <div class="text-6xl mb-4">🏆</div>
      <h3 class="text-2xl font-bold text-white mb-2">Amazing Job!</h3>
      <p class="text-gray-300 mb-6">You scored <span class="text-emerald-400 font-bold text-2xl">{{ score() }}</span> points for the environment.</p>
      
      <button 
        (click)="resetPuzzle()"
        class="bg-white/10 hover:bg-white/20 border border-white/20 px-6 py-3 rounded-full font-semibold transition"
      >
        Play Again 🔄
      </button>
    </div>

  </div>
</section>
